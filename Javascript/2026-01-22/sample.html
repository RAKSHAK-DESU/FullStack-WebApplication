<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Demo</title>
    <script>
       function VerifyUser(){
            const username = document.getElementById("txtName").value;
            const msg= document.getElementById("msg");
            if(username.length>=4 && username.length<=10)
            {
                msg.innerHTML = "User Name Verified".bold().fontcolor('green').italics();
            }else{
                msg.innerHTML = "Invalid - UserName 4 to 10 chars Only".italics().fontcolor('red');
            }
        }

        function ChangeCase(){
            const username= document.getElementById('txtName').value;
            document.getElementById('txtName').value= username.toUpperCase();
        }
    </script>
</head>
<body>
    <h2>Register user</h2>
    <dl>
        <dt>User Name</dt>
        <dd><input placeholder="Block Letter" type="text" id="txtName" onkeyup="VerifyUser()" onblur="ChangeCase()"></dd>
        <dd id="msg"></dd>
    </dl>
    <button onclick="SubmitClick()">Submit</button>
</body>
</html>
