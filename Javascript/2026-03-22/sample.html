<!DOCTYPE html>
<html>
    <head>
        <title>String Handling in Javascript</title>
        <script>
            function VerifyUser(){
                var username= document.getElementById("txtName").value;
                var msg= document.getElementById("msg");
                if(username.length>=4 && username.length<=10)
                {
                    msg.innerHTML= "User Name Verified".bold().fontcolor('green').italics();
                }
                else{
                    msg.innerHTML= "Invalid - Username 4 to 10 Chars only".italics().fontcolor('red');
                }
            }

            function ChangeCase(){
                var username=document.getElementById("txtName").value= username;
                document.getElementById("txtName").value = username.toUpperCase();
            }
        </script>
    </head>
    <body>
        <h2>Register User</h2>
        <dl>
            <dt>User Name</dt>
            <dd><input type="text" placeholder="Block Letters" id="txtName" onkeyup="VerifyUser()" onblur="ChangeCase()"></dd>
            <dd id="msg"></dd>
        </dl>
        <button onclick="VerifyUser()">Submit</button>
    </body>
</html>
